name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Release Version Name'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify and Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ENCODED_KEYSTORE" ]; then
          echo "ERROR: KEYSTORE_BASE64 secret is missing. Aborting release."
          exit 1
        fi
        echo "$ENCODED_KEYSTORE" | base64 -d > app/release-keystore.jks

    - name: Verify Keystore Security Health
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        chmod +x scripts/verify_keystore.sh
        ./scripts/verify_keystore.sh app/release-keystore.jks "$KEYSTORE_PASSWORD" "$KEY_ALIAS"

    - name: Upload Security Health Report
      uses: actions/upload-artifact@v4
      with:
        name: security-health-report
        path: security_health_report.txt

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_FILE: "release-keystore.jks"
      run: |
        if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
          echo "ERROR: One or more signing secrets (KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) are missing. Aborting release."
          exit 1
        fi
        ./gradlew :app:assembleRelease

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
