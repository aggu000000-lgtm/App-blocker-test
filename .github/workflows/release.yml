name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Release Version Name'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        # Create a dummy keystore if the secret is empty (for POC purposes)
        if [ -z "$ENCODED_KEYSTORE" ]; then
          keytool -genkey -v -keystore app/release-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dummy_alias -storepass dummy_password -keypass dummy_password -dname "CN=POC, OU=IT, O=Company, L=City, ST=State, C=US"
        else
          echo $ENCODED_KEYSTORE | base64 -d > app/release-keystore.jks
        fi

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'dummy_password' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'dummy_alias' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'dummy_password' }}
        KEYSTORE_FILE: "release-keystore.jks"
      run: ./gradlew :app:assembleRelease

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
